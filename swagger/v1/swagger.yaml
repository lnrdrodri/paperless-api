              type: object
              properties:
                id:
                  type: integer
                name:
                  type: string
                cnpj:
                  type: string
                created_at:
                  type: string
                  format: date-time
                updated_at:
                  type: string
                  format: date-time
                addresses_attributes:
                  type: array
