---
openapi: 3.0.1
info:
  title: API V1
  version: v1
paths:
  "/v1/users/participants":
    get:
      summary: Retrieves all participants
      tags:
      - V1|Users|Participants|ParticipantsResources
      security:
      - user_auth_jwt: []
      parameters:
      - name: term
        required: false
        in: query
        description: Term to search
        schema:
          type: string
      responses:
        '200':
          description: participants found
          content:
            application/json:
              schema:
                type: object
                properties:
                  participants:
                    type: array
                    items:
                      allOf:
                      - "$ref": "#/components/partials/v1/users/participants/participants/_participant"
                  total_count:
                    type: integer
                  aggregators:
                    type: object
                    properties: {}
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                example:
                  message: User not logged
    post:
      summary: Create a participant
      tags:
      - V1|Users|Participants|ParticipantsResources
      security:
      - user_auth_jwt: []
      parameters: []
      responses:
        '200':
          description: Participant created
