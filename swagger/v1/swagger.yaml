          type: string
        iso:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Participant:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        cnpj:
          type: string
        status:
          type: string
        is_deleted:
          type: boolean
        created_at:
          type: string
          format: date-time
