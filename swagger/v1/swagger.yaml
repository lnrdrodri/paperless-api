          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
  partials:
    v1:
      users:
        participants:
          participants:
            _participant:
              type: object
              properties:
                id:
                  type: integer
                name:
                  type: string
                cnpj:
                  type: string
                created_at:
                  type: string
